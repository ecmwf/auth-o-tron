<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 850" width="100%" height="100%" style="font-family: system-ui, -apple-system, sans-serif; background: transparent;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#334155" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="16" />

  <!-- Main Boxes -->
  <g filter="url(#shadow)">
    <!-- Client -->
    <rect x="360" y="60" width="180" height="60" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="450" y="96" fill="#334155" font-size="18" font-weight="600" text-anchor="middle">Client</text>

    <!-- NGINX -->
    <rect x="360" y="220" width="180" height="60" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="450" y="256" fill="#334155" font-size="18" font-weight="600" text-anchor="middle">NGINX / Ingress</text>

    <!-- Auth-O-Tron -->
    <rect x="360" y="440" width="180" height="60" rx="8" fill="#fff1f2" stroke="#e63946" stroke-width="3"/>
    <text x="450" y="476" fill="#e63946" font-size="18" font-weight="bold" text-anchor="middle">Auth-O-Tron</text>

    <!-- Backend -->
    <rect x="360" y="680" width="180" height="60" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="450" y="716" fill="#334155" font-size="18" font-weight="600" text-anchor="middle">Backend Services</text>

    <!-- Providers (Dashed) -->
    <rect x="40" y="440" width="180" height="60" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="130" y="468" fill="#334155" font-size="16" font-weight="600" text-anchor="middle">Providers</text>
    <text x="130" y="488" fill="#64748b" font-size="14" text-anchor="middle">JWT, Basic, OIDC</text>

    <!-- Augmenters (Dashed) -->
    <rect x="680" y="440" width="180" height="60" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="770" y="468" fill="#334155" font-size="16" font-weight="600" text-anchor="middle">Augmenters</text>
    <text x="770" y="488" fill="#64748b" font-size="14" text-anchor="middle">LDAP, Static Rules</text>
  </g>

  <!-- Step 1: Client -> NGINX -->
  <path d="M 450 120 L 450 205" fill="none" stroke="#64748b" stroke-width="3"/>
  <polygon points="444,195 456,195 450,210" fill="#64748b"/>
  <circle cx="480" cy="165" r="14" fill="#e63946"/>
  <text x="480" y="170" fill="white" font-size="14" font-weight="bold" text-anchor="middle">1</text>
  <text x="510" y="171" fill="#334155" font-size="16" font-weight="600">Client sends request with credentials</text>

  <!-- Step 2: NGINX -> Auth (down left of center) -->
  <path d="M 420 280 L 420 425" fill="none" stroke="#64748b" stroke-width="3"/>
  <polygon points="414,415 426,415 420,430" fill="#64748b"/>
  <circle cx="445" cy="355" r="14" fill="#e63946"/>
  <text x="445" y="360" fill="white" font-size="14" font-weight="bold" text-anchor="middle">2</text>
  <text x="475" y="361" fill="#334155" font-size="16" font-weight="600">NGINX forwards as internal auth subrequest</text>

  <!-- Step 3: Auth -> Providers -->
  <path d="M 360 470 L 235 470" fill="none" stroke="#64748b" stroke-width="3"/>
  <polygon points="245,464 245,476 230,470" fill="#64748b"/>
  <circle cx="310" cy="435" r="14" fill="#e63946"/>
  <text x="310" y="440" fill="white" font-size="14" font-weight="bold" text-anchor="middle">3</text>
  <text x="280" y="441" fill="#334155" font-size="16" font-weight="600" text-anchor="end">Validates credentials</text>

  <!-- Step 4: Auth -> Augmenters -->
  <path d="M 540 470 L 665 470" fill="none" stroke="#64748b" stroke-width="3"/>
  <polygon points="655,464 655,476 670,470" fill="#64748b"/>
  <circle cx="590" cy="435" r="14" fill="#e63946"/>
  <text x="590" y="440" fill="white" font-size="14" font-weight="bold" text-anchor="middle">4</text>
  <text x="620" y="441" fill="#334155" font-size="16" font-weight="600">Enriches user</text>

  <!-- Step 5: Auth -> NGINX (up right of center) -->
  <path d="M 480 440 L 480 295" fill="none" stroke="#e63946" stroke-width="3"/>
  <polygon points="474,305 486,305 480,290" fill="#e63946"/>
  <circle cx="505" cy="395" r="14" fill="#e63946"/>
  <text x="505" y="400" fill="white" font-size="14" font-weight="bold" text-anchor="middle">5</text>
  <text x="535" y="401" fill="#334155" font-size="16" font-weight="600">Returns 200 + signed JWT</text>

  <!-- Step 6: NGINX -> Backend (bypass around left) -->
  <path d="M 390 280 L 390 310 L 15 310 L 15 630 L 450 630 L 450 665" fill="none" stroke="#e63946" stroke-width="3"/>
  <polygon points="444,655 456,655 450,670" fill="#e63946"/>
  <circle cx="50" cy="580" r="14" fill="#e63946"/>
  <text x="50" y="585" fill="white" font-size="14" font-weight="bold" text-anchor="middle">6</text>
  <text x="80" y="586" fill="#334155" font-size="16" font-weight="600">NGINX forwards original request + JWT to Backend Services</text>

</svg>