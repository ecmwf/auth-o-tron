version: 2.0.0

logging:
  level: "debug"
  format: "console"

auth:
  timeout_in_ms: 3000 # 3 seconds

providers:
  - name: "plain-provider"
    type: "plain"
    realm: "localrealm"
    users:
      - username: "test_user"
        password: "secret123"
      - username: "test_user2"
        password: "p@ssw0rd"
  - name: "ECMWF API Provider"
    type: "ecmwf-api"
    uri: https://api.ecmwf.int/v1
    realm: "ecmwf"

store:
  enabled: false
  # type: mongo
  # database: tokens
  # uri: mongodb://mongodb:27017

services: []

jwt:
  exp: 3600
  iss: authotron-test
  aud: authotron-test
  kid: nginx-example-2026-01
  # Inject a complete RSA private PEM with AOT_JWT__PRIVATE_KEY.
  private_key: set-via-AOT_JWT__PRIVATE_KEY

server:
  host: "0.0.0.0"
  port: 8080
