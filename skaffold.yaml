apiVersion: skaffold/v4beta2
kind: Config
metadata:
  name: auth-o-tron
build:
  local:
    useBuildkit: true
    concurrency: 1

  tagPolicy:
    customTemplate:
      template: "{{.GIT_TAG}}{{if ne .TARGETARCH \"\"}}-{{.TARGETARCH}}{{end}}"
      components:
        - name: GIT_TAG
          gitCommit:
            variant: Tags
        - name: TARGETARCH
          envTemplate:
            template: '{{ default "" .TARGETARCH }}'

  artifacts:
    - image: "auth-o-tron"
      context: .
      docker:
        dockerfile: Dockerfile
        target: release

    - image: "auth-o-tron-debug"
      context: .
      docker:
        dockerfile: Dockerfile
        target: debug
